<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>飲食記錄系統</title>
  <style>
    body { font-family: -apple-system, sans-serif; margin: 0; background: #f7f7f8; color: #333; padding-bottom: 50px; }
    header { background: #ff9800; color: white; text-align: center; padding: 18px; font-weight: bold; font-size: 20px; }
    .container { padding: 20px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; color: #666; }
    input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; background: #fff; }
    .food-item { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #eee; }
    .food-item input { flex: 3; border: none; background: transparent; }
    .food-item select { flex: 1.5; border: 1px solid #eee; background: #f9f9f9; }
    .del-btn { background: #ff5252; color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; }
    .add-btn { background: white; color: #ff9800; border: 2px solid #ff9800; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; margin-top: 5px; }
    .upload-box { border: 2px dashed #ff9800; padding: 20px; text-align: center; border-radius: 10px; background: #fff; position: relative; }
    #photo { position: absolute; opacity: 0; left: 0; top: 0; width: 100%; height: 100%; cursor: pointer; }
    #previewImg { max-width: 100%; max-height: 200px; display: none; margin: 15px auto; border-radius: 8px; }
    #submitBtn { width: 100%; padding: 16px; background: #ff9800; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; margin-top: 25px; }
    #status { text-align: center; margin-top: 20px; font-size: 15px; font-weight: bold; }

    /* 數據區域 */
    .dashboard { margin-top: 40px; border-top: 2px solid #ddd; padding-top: 20px; }
    .dashboard-title { font-size: 22px; font-weight: bold; color: #ff9800; margin-bottom: 15px; text-align: center; }
    .base-info { background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #ddd; }
    .base-info p { margin: 5px 0; font-weight: bold; font-size: 15px; }
    .card { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .card-title { font-size: 17px; font-weight: bold; border-left: 4px solid #ff9800; padding-left: 10px; margin-bottom: 12px; }
    .progress-main { font-size: 24px; font-weight: 900; color: #ff9800; text-align: center; margin: 10px 0; }
    .weekly-row { font-size: 13px; margin-bottom: 5px; border-bottom: 1px dashed #eee; padding-bottom: 5px; line-height: 1.4; }
    .rank-item { display: flex; justify-content: space-between; padding: 5px 0; font-size: 14px; }
    .badge { background: #ff9800; color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
    .alert-text { color: #ff5252; font-weight: bold; }
  </style>
</head>
<body>

<header>🍎 飲食記錄系統</header>

<div class="container">
  <form id="dietForm">
    <div class="form-group">
      <label>現場拍照</label>
      <div class="upload-box"><span id="fileLabel">📸 點擊開啟相機</span><input type="file" id="photo" accept="image/*" required></div>
      <img id="previewImg">
    </div>
    <div class="form-group">
      <label>用餐類型 & 店名</label>
      <select id="type" style="margin-bottom: 10px;"><option value="外出">外出用餐</option><option value="Self Prepare">自備 (Self Prepare)</option></select>
      <input type="text" id="merchant" placeholder="輸入食店" required>
    </div>
    <div class="form-group">
      <label>食物內容與數量</label>
      <div id="foodList"></div>
      <button type="button" class="add-btn" onclick="addFoodRow()">＋ 新增食物項目</button>
    </div>
    <button type="submit" id="submitBtn">確認傳送資料</button>
    <div id="status"></div>
  </form>

  <div class="dashboard">
    <div class="dashboard-title">📊 查看數據</div>
    <div class="form-group"><label>用戶</label><select disabled><option selected>Harry</option></select></div>
    <div class="base-info">
      <p>一日所需基本卡路里：3000</p>
      <p>目標熱量赤字：200</p>
      <p style="color: #ff9800; font-size: 18px;">每日涉取目標：2800</p>
    </div>

    <div class="card">
      <div class="card-title">今日進程</div>
      <input type="date" id="statsDate" onchange="loadStats()">
      <div class="progress-main" id="dailyDisplay">讀取中...</div>
      <div style="text-align:center; font-size:14px;" id="dailyRemain">--</div>
    </div>

    <div class="card">
      <div class="card-title">每週進度 (週日開始)</div>
      <input type="week" id="statsWeek" onchange="loadStats()">
      <div id="weeklyLogList" style="margin-top:15px;"></div>
      <div id="weeklyTotalDisplay" style="margin-top:10px; font-weight:bold; text-align:right; color:#ff9800;"></div>
    </div>

    <div class="card"><div class="card-title">食店排行榜 (本週)</div><div id="merchantRankList"></div></div>
    <div class="card"><div class="card-title">食物排行榜 (本週)</div><div id="foodRankList"></div></div>
    <div class="card"><div class="card-title">外出 / Self Prepare 比例</div><div id="ratioDisplay" style="text-align:center; font-weight:bold;">--</div></div>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwc80ayuKY8EHNa8kLfe_sOuHMHvEE3YzVGouQxdD0lztuOuKlU9sf_6ggkv3_UoHy-/exec";

  window.onload = () => {
    const now = new Date();
    document.getElementById('statsDate').value = now.toISOString().split('T')[0];
    
    // 計算當前週份 (ISO-8601)
    const target = new Date(now.valueOf());
    const dayNr = (now.getDay() + 6) % 7;
    target.setDate(target.getDate() - dayNr + 3);
    const firstThursday = target.valueOf();
    target.setMonth(0, 1);
    if (target.getDay() !== 4) target.setMonth(0, 1 + ((4 - target.getDay()) + 7) % 7);
    const weekNum = 1 + Math.ceil((firstThursday - target) / 604800000);
    document.getElementById('statsWeek').value = `${now.getFullYear()}-W${String(weekNum).padStart(2,'0')}`;

    loadStats();
  };

  async function loadStats() {
    const date = document.getElementById('statsDate').value;
    const week = document.getElementById('statsWeek').value;
    const status = document.getElementById('dailyDisplay');
    status.innerText = "⏳ 讀取中...";

    try {
      // 透過 GET 方式獲取 JSON 資料
      const response = await fetch(`${GAS_URL}?action=getStats&date=${date}&week=${week}`);
      const s = await response.json();
      renderStats(s);
    } catch (e) {
      status.innerText = "讀取失敗";
      console.error(e);
    }
  }

  function renderStats(s) {
    document.getElementById('dailyDisplay').innerText = `${Math.round(s.dailyTotal)} / 2800`;
    const remain = 2800 - s.dailyTotal;
    document.getElementById('dailyRemain').innerText = `今天尚餘 ${Math.round(remain)} 卡路里涉取`;

    let weekHtml = '';
    s.weeklyLog.forEach(day => {
      const isExtra = day.deficit < 0;
      weekHtml += `<div class="weekly-row">${day.dateText}：2800 - ${Math.round(day.cal)} ＝ ${Math.round(day.deficit)} ${isExtra ? '<span class="alert-text">(多餘熱量！)</span>' : '(熱量赤字)'}</div>`;
    });
    document.getElementById('weeklyLogList').innerHTML = weekHtml;
    document.getElementById('weeklyTotalDisplay').innerText = `本週總結：${s.weeklyTotalDeficit >= 0 ? '熱量赤字 ' : '多餘熱量 '}${Math.round(Math.abs(s.weeklyTotalDeficit))}`;

    const renderRank = (data, elementId) => {
      const sorted = Object.entries(data).sort((a,b) => b[1] - a[1]).slice(0, 5);
      document.getElementById(elementId).innerHTML = sorted.map(([name, count]) => `<div class="rank-item"><span>${name}</span><span class="badge">${count} 次</span></div>`).join('') || '暫無數據';
    };
    renderRank(s.merchantRank, 'merchantRankList');
    renderRank(s.foodRank, 'foodRankList');

    const total = s.sourceRatio["外出"] + s.sourceRatio["Self Prepare"];
    document.getElementById('ratioDisplay').innerText = total > 0 ? `外出 ${Math.round(s.sourceRatio["外出"]/total*100)}% | 自備 ${Math.round(s.sourceRatio["Self Prepare"]/total*100)}%` : '--';
  }

  function addFoodRow() {
    const div = document.createElement('div');
    div.className = 'food-item';
    div.innerHTML = `<input type="text" name="foodName" placeholder="食物名稱" required>
      <select name="foodQty"><option value="0.5">0.5</option><option value="1" selected>1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option></select>
      <button type="button" class="del-btn" onclick="this.parentElement.remove()">✕</button>`;
    foodListContainer.appendChild(div);
  }
  const foodListContainer = document.getElementById('foodList');
  addFoodRow();

  const photoInput = document.getElementById('photo');
  photoInput.onchange = e => {
    if(e.target.files[0]) {
      document.getElementById('fileLabel').innerText = "✅ 已就緒";
      const reader = new FileReader();
      reader.onload = ev => { 
        document.getElementById('previewImg').src = ev.target.result;
        document.getElementById('previewImg').style.display = "block";
      };
      reader.readAsDataURL(e.target.files[0]);
    }
  };

  document.getElementById('dietForm').onsubmit = async e => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('status');
    const items = Array.from(document.querySelectorAll('.food-item')).map(row => ({
      name: row.querySelector('[name="foodName"]').value.trim(),
      qty: row.querySelector('[name="foodQty"]').value
    }));
    btn.disabled = true;
    status.innerText = "⏳ 傳送中...";
    try {
      const now = new Date();
      const d = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
      const t = now.toTimeString().split(' ')[0];
      const base64Image = await compressImage(photoInput.files[0]);
      await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ date: d, time: t, type: document.getElementById('type').value, merchant: document.getElementById('merchant').value, imageBase64: base64Image, items: items }) });
      status.innerText = "✅ 成功！";
      setTimeout(() => location.reload(), 1500);
    } catch(err) {
      status.innerText = "❌ 失敗";
      btn.disabled = false;
    }
  };

  function compressImage(file) {
    return new Promise((resolve) => {
      const img = new Image();
      img.src = URL.createObjectURL(file);
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const max = 600; 
        let w = img.width, h = img.height;
        if(w > max) { h *= max/w; w = max; }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.6).split(',')[1]);
      };
    });
  }
</script>
</body>
</html>
