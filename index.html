<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>飲食記錄</title>
  <style>
    body { font-family: -apple-system, sans-serif; margin: 0; background: #f7f7f8; }
    header { background: #ff9800; color: white; text-align: center; padding: 16px; font-weight: bold; position: sticky; top: 0; z-index: 10; }
    .container { padding: 20px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
    input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    .food-item { display: flex; gap: 8px; margin-bottom: 10px; }
    .food-item input[name="foodName"] { flex: 3; }
    .food-item input[name="foodQty"] { flex: 1.5; text-align: center; }
    .del-btn { background: #ff5252; color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; }
    .add-btn { background: white; color: #ff9800; border: 1px solid #ff9800; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
    .upload-box { border: 2px dashed #ff9800; padding: 15px; text-align: center; border-radius: 8px; background: white; cursor: pointer; position: relative; }
    #photo { position: absolute; opacity: 0; left: 0; top: 0; width: 100%; height: 100%; }
    #previewImg { max-width: 100%; max-height: 150px; display: none; margin: 10px auto; border-radius: 5px; }
    button[type="submit"] { width: 100%; padding: 15px; background: #ff9800; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; margin-top: 20px; }
    #status { text-align: center; margin-top: 15px; font-size: 14px; color: #666; }
  </style>
</head>
<body>

<header>飲食記錄</header>

<div class="container">
  <form id="dietForm">
    <div class="form-group">
      <label>相片</label>
      <div class="upload-box">
        <span id="fileLabel">📸 點擊選取相片</span>
        <input type="file" id="photo" accept="image/*" required>
      </div>
      <img id="previewImg">
    </div>

    <div class="form-group">
      <label>類型</label>
      <select id="type">
        <option value="外出">外出</option>
        <option value="Self Prepare">Self Prepare</option>
      </select>
    </div>

    <div class="form-group">
      <label>食店名稱</label>
      <input type="text" id="merchant" placeholder="店名" required>
    </div>

    <div class="form-group">
      <label>食物與數量</label>
      <div id="foodList"></div>
      <button type="button" class="add-btn" onclick="addFoodRow()">＋ 新增食物</button>
    </div>

    <button type="submit" id="submitBtn">傳送資料</button>
    <div id="status"></div>
  </form>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwc80ayuKY8EHNa8kLfe_sOuHMHvEE3YzVGouQxdD0lztuOuKlU9sf_6ggkv3_UoHy-/exec";

  const foodListContainer = document.getElementById('foodList');
  function addFoodRow() {
    const div = document.createElement('div');
    div.className = 'food-item';
    div.innerHTML = `<input type="text" name="foodName" placeholder="食物" required>
                     <input type="number" name="foodQty" value="1" min="0.5" step="0.5">
                     <button type="button" class="del-btn" onclick="this.parentElement.remove()">✕</button>`;
    foodListContainer.appendChild(div);
  }
  addFoodRow(); // 初始一行

  const photoInput = document.getElementById('photo');
  photoInput.onchange = e => {
    if(e.target.files[0]) {
      document.getElementById('fileLabel').innerText = "✅ 已選取相片";
      const reader = new FileReader();
      reader.onload = e => { 
        const preview = document.getElementById('previewImg');
        preview.src = e.target.result;
        preview.style.display = "block";
      };
      reader.readAsDataURL(e.target.files[0]);
    }
  };

  document.getElementById('dietForm').onsubmit = async e => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('status');
    const items = Array.from(document.querySelectorAll('.food-item')).map(row => ({
      name: row.querySelector('[name="foodName"]').value,
      qty: row.querySelector('[name="foodQty"]').value
    }));

    btn.disabled = true;
    status.innerText = "正在處理圖片...";

    try {
      const base64Image = await compressImage(photoInput.files[0]);
      const now = new Date();
      const d = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
      const t = now.toTimeString().split(' ')[0];

      // 逐項傳送，保證順序與完整性
      for(let i=0; i<items.length; i++) {
        status.innerText = `正在上傳第 ${i+1}/${items.length} 項...`;
        await fetch(GAS_URL, {
          method: 'POST',
          mode: 'no-cors', // 確保跨域請求能發出
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({
            date: d, time: t,
            type: document.getElementById('type').value,
            merchant: document.getElementById('merchant').value,
            foodName: items[i].name,
            qty: items[i].qty,
            imageBase64: i === 0 ? base64Image : "SKIP"
          })
        });
      }
      status.innerText = "✅ 成功！兩秒後重置";
      setTimeout(() => location.reload(), 2000);
    } catch(err) {
      status.innerText = "❌ 發生錯誤";
      btn.disabled = false;
    }
  };

  function compressImage(file) {
    return new Promise(res => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = e => {
        const img = new Image();
        img.src = e.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          const max = 800;
          let w = img.width, h = img.height;
          if(w > max) { h *= max/w; w = max; }
          canvas.width = w; canvas.height = h;
          ctx.drawImage(img, 0, 0, w, h);
          res(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
        };
      };
    });
  }
</script>

</body>
</html>
